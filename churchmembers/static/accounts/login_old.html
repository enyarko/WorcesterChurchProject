{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | E-Digit Systems</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{% static 'accounts/css/login.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <div class="brand-box">
            <div class="brand-logo">
                <i class="bi bi-shield-lock-fill"></i>
            </div>
            <h1>E-Digit Systems</h1>
            <p>Secure access to your digital dashboard</p>
        </div>

        {% if form.errors %}
        <div class="error-box">
            Invalid username or password.
        </div>
        {% endif %}

        <form method="post" id="loginForm" novalidate>
            {% csrf_token %}

            <div class="form-group">
                <input type="text" name="username" id="username" required>
                <label for="username">Email or Username</label>
                <i class="bi bi-person"></i>
                <small class="error-message"></small>
            </div>

            <div class="form-group">
                <input type="password" name="password" id="password" required>
                <label for="password">Password</label>
                <i class="bi bi-lock"></i>
                <button type="button" class="password-toggle" onclick="togglePassword()">
                    <i class="bi bi-eye" id="eyeIcon"></i>
                </button>
                <small class="error-message"></small>
            </div>

            <div class="form-row">
                <label class="remember">
                    <input type="checkbox" name="remember">
                    Remember me
                </label>

                <a href="#">Forgot password?</a>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                <span class="btn-text">Sign In</span>
                <span class="loader"></span>
            </button>

        </form>

        <div class="divider">
            <span>or continue with</span>
        </div>

        <div class="social-login">
            <button><i class="bi bi-google"></i> Google</button>
            <button><i class="bi bi-github"></i> GitHub</button>
            <button><i class="bi bi-building-lock"></i> SSO</button>
        </div>

        <p class="signup-text">
            New here? <a href="#">Create an account</a>
        </p>

    </div>

</div>

<script>
const form = document.getElementById("loginForm");
const loginBtn = document.getElementById("loginBtn");

form.addEventListener("submit", function(e) {
    let valid = true;

    const username = document.getElementById("username");
    const password = document.getElementById("password");

    clearErrors();

    if (username.value.trim() === "") {
        showError(username, "Username or email is required");
        valid = false;
    }

    if (password.value.trim() === "") {
        showError(password, "Password is required");
        valid = false;
    }

    if (!valid) {
        e.preventDefault();
        return;
    }

    loginBtn.classList.add("loading");
});

function showError(input, message) {
    const group = input.closest(".form-group");
    group.classList.add("invalid");
    group.querySelector(".error-message").innerText = message;
}

function clearErrors() {
    document.querySelectorAll(".form-group").forEach(group => {
        group.classList.remove("invalid");
        group.querySelector(".error-message").innerText = "";
    });
}

function togglePassword() {
    const password = document.getElementById("password");
    const eyeIcon = document.getElementById("eyeIcon");

    if (password.type === "password") {
        password.type = "text";
        eyeIcon.className = "bi bi-eye-slash";
    } else {
        password.type = "password";
        eyeIcon.className = "bi bi-eye";
    }
}
</script>

</body>
</html>
