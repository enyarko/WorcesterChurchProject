<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Member</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <div class="card shadow p-4">
      <h2 class="mb-4">Edit Member</h2>

      <form method="POST">
        {% csrf_token %}

        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">First Name</label>
            <input type="text" name="firstname" class="form-control" value="{{ member.firstname }}">
          </div>

          <div class="col-md-6">
            <label class="form-label">Last Name</label>
            <input type="text" name="lastname" class="form-control" value="{{ member.lastname }}">
          </div>

          <div class="col-md-6">
            <label class="form-label">Address</label>
            <input type="text" name="address" class="form-control" value="{{ member.address }}">
          </div>

          <div class="col-md-6">
            <label class="form-label">Home Phone</label>
            <input type="text" name="home_phone" class="form-control" value="{{ member.home_phone }}">
          </div>

          <div class="col-md-6">
            <label class="form-label">Cell Phone</label>
            <input type="text" name="cell_phone" class="form-control" value="{{ member.cell_phone }}">
          </div>

          <div class="col-md-6">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" value="{{ member.email }}">
          </div>

          <div class="col-md-6">
            <label class="form-label">Birthday</label>
            <input type="date" name="birthday" class="form-control" value="{{ member.birthday|date:'Y-m-d' }}">
          </div>

          <div class="col-md-6">
            <label class="form-label">Baptismal Date</label>
            <input type="date" name="baptismal_date" class="form-control" value="{{ member.baptismal_date|date:'Y-m-d' }}">
          </div>
        </div>

        <div class="mt-4">
          <button type="submit" class="btn btn-primary">Save Changes</button>
          <a href="{% url 'member_list' %}" class="btn btn-secondary">Back</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
