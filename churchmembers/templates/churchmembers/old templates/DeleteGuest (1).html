<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delete Guest</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#eef5f9;">
<div class="container mt-5">
  <div class="card shadow p-4 border-danger">
    <h2 class="text-danger">Delete Guest Record</h2>
    <p>Are you sure you want to delete this guest record?</p>
    <p><strong>{{ guest.display_name|default:guest.first_name }}</strong></p>

    <form method="POST">
      {% csrf_token %}
      <a href="{% url 'guest_records' %}" class="btn btn-outline-secondary">Cancel</a>
      <button type="submit" class="btn btn-danger">Yes, Delete</button>
    </form>
  </div>
</div>
</body>
</html>
